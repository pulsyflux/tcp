name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GONOSUMDB: ""
  GOFLAGS: -mod=readonly

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        run: govulncheck ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get latest tag and bump patch version
        id: version
        shell: bash
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "new_tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            major=$(echo "$latest" | sed 's/v//' | cut -d. -f1)
            minor=$(echo "$latest" | sed 's/v//' | cut -d. -f2)
            patch=$(echo "$latest" | sed 's/v//' | cut -d. -f3)
            patch=$((patch + 1))
            echo "new_tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Publish to Go module proxy
        run: go list -m github.com/pulsyflux/tcp@${{ steps.version.outputs.new_tag }}
        env:
          GOPROXY: https://proxy.golang.org
